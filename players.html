<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>82-0 Database | Player Database</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">

    <div class="logo">
        <a href="index.html">82-0 Database</a>
    </div>

    <button class="menu-toggle" id="menuToggle">
        ☰
    </button>

    <nav id="navMenu">

        <a href="index.html">Home</a>

        <a href="players.html">Database</a>

        <a href="tracker.html">Tracker</a>

    </nav>

</header>

<main class="database-page">

    <section class="database-header">

        <h1>82-0 Player Database</h1>

        <p class="player-count">
            Showing <span id="playerCount">10,626</span> Players
        </p>

        <div class="search-container">

            <input
                id="searchInput"
                type="search"
                placeholder="Search player, team, decade..."
            >

        </div>

        <div class="filter-row">

            <button class="filter-chip" id="teamButton">
                All Teams ▼
            </button>

            <button class="filter-chip" id="decadeButton">
                All Decades ▼
            </button>

        </div>

        <div class="position-row">

            <button class="position-chip active">All</button>
            <button class="position-chip">PG</button>
            <button class="position-chip">SG</button>
            <button class="position-chip">SF</button>
            <button class="position-chip">PF</button>
            <button class="position-chip">C</button>

        </div>

        <div class="sort-row">

            <label for="sortSelect">Sort By</label>

            <select id="sortSelect">

                <option>A–Z</option>
                <option>Z–A</option>

                <option>Total</option>

                <option>Grade</option>

                <option>PPG</option>

                <option>RPG</option>

                <option>APG</option>

                <option>SPG</option>

                <option>BPG</option>

            </select>

        </div>

    </section>

</main>

<footer>
    <p>
        Unofficial fan-made database. Not affiliated with or endorsed by
        Vaulty Studios Inc., or sponsored by the National Basketball Association (NBA).
    </p>
    <p>Version 0.1.0</p>
</footer>

<script src="script.js"></script>

</body>
</html>
