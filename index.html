<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>82-0 Player Database</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #111827;
            color: white;
            text-align: center;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 10px;
            color: #fbbf24;
        }

        p {
            font-size: 20px;
            color: #d1d5db;
        }

        .stats {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            background-color: #1f2937;
            padding: 20px;
            border-radius: 12px;
            width: 180px;
        }

        .card h2 {
            margin: 0;
            color: #fbbf24;
            font-size: 32px;
        }

        .card span {
            color: #9ca3af;
            font-size: 16px;
        }

        .button {
            display: inline-block;
            margin-top: 40px;
            padding: 14px 28px;
            background-color: #fbbf24;
            color: black;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
        }

        .button:hover {
            background-color: #fcd34d;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>82-0 Player Database</h1>
        <p>A complete historical NBA player database.</p>

        <div class="stats">
            <div class="card">
                <h2>10,626</h2>
                <span>Players</span>
            </div>

            <div class="card">
                <h2>180</h2>
                <span>Team-Eras</span>
            </div>

            <div class="card">
                <h2>7</h2>
                <span>Decades</span>
            </div>
        </div>

        <a class="button" href="#">Browse Database</a>
    </div>
</body>
</html>
